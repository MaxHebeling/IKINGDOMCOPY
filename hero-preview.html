<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iKingdom — Hero</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:  #D4AF37;
      --gold2: #C49A28;
      --navy:  #041E39;
      --deep:  #06162A;
      --cream: #F8F6F1;
      --gray:  #C9D1D9;
      --muted: #8B98A5;
      --gl:    rgba(212,175,55,0.3);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'Space Grotesk', system-ui, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: #000; }
    * { cursor: none; }

    /* ══════════════════════════════════════════════
       HERO
    ══════════════════════════════════════════════ */
    .hero {
      position: relative;
      width: 100%; height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* Fondo — empieza invisible, aparece DESPUÉS del título */
    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 65% 45%, rgba(212,175,55,0.07) 0%, transparent 55%),
        linear-gradient(150deg, #06162A 0%, #041E39 50%, #051020 100%);
      opacity: 0; z-index: 0;
    }
    .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(212,175,55,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.025) 1px, transparent 1px);
      background-size: 56px 56px;
      opacity: 0; z-index: 1;
    }

    /* Destello de impacto — flash dorado detrás del título */
    .impact-flash {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 900px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(212,175,55,0.22) 0%, transparent 70%);
      opacity: 0; z-index: 2;
      pointer-events: none;
    }

    /* Orbe ambient */
    .orb {
      position: absolute; right: -5%; top: 50%;
      transform: translateY(-50%);
      width: 800px; height: 800px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.07) 0%, transparent 60%);
      opacity: 0; z-index: 1; pointer-events: none;
    }

    /* Línea vertical izq */
    .vline {
      position: absolute; left: 72px; top: 0;
      width: 1px; height: 100%;
      background: linear-gradient(to bottom, transparent, var(--gl) 25%, var(--gl) 75%, transparent);
      z-index: 3; transform-origin: top; transform: scaleY(0);
    }

    /* ══════════════════════════════════════════════
       CONTENIDO
    ══════════════════════════════════════════════ */
    .content {
      position: relative; z-index: 10;
      padding: 0 80px 0 96px;
      max-width: 900px;
    }

    /* Eyebrow */
    .eyebrow {
      display: flex; align-items: center; gap: 12px;
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 24px;
      overflow: hidden; opacity: 0;
    }
    .eyebrow-in { display: flex; align-items: center; gap: 12px; transform: translateY(110%); }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

    /* Headline — EL PROTAGONISTA */
    .headline {
      font-family: var(--serif);
      font-size: clamp(68px, 8vw, 118px);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--cream);
      margin-bottom: 0;
      transform: translateY(-90px);
      opacity: 0;
      will-change: transform, opacity;
    }
    .headline em {
      font-style: italic;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: -0.02em;
    }
    .headline strong {
      font-weight: 300;
      color: rgba(248,246,241,0.45);
    }

    /* Línea dorada bajo el headline */
    .gold-rule {
      display: block;
      width: 0;
      height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
      margin: 28px 0 32px;
    }

    /* Sub */
    .sub-wrap { overflow: hidden; }
    .sub {
      font-family: var(--sans); font-size: 15px; font-weight: 300;
      line-height: 1.75; color: var(--gray);
      max-width: 460px; margin-bottom: 52px;
      transform: translateY(110%);
    }

    /* CTAs */
    .cta-wrap { overflow: hidden; }
    .cta-row {
      display: flex; align-items: center; gap: 32px;
      transform: translateY(110%);
    }

    .btn-p {
      display: inline-flex; align-items: center;
      padding: 15px 36px;
      background: var(--gold); color: var(--deep);
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none;
      position: relative; overflow: hidden;
      transition: color .35s;
    }
    .btn-p::after { content:''; position:absolute; inset:0; background:var(--deep); transform:translateX(-101%); transition:transform .4s cubic-bezier(.77,0,.18,1); }
    .btn-p:hover { color:var(--gold); }
    .btn-p:hover::after { transform:translateX(0); }
    .btn-p span { position:relative; z-index:1; }

    .btn-s {
      font-family: var(--sans); font-size: 13px; color: var(--muted);
      text-decoration: none; display: flex; align-items: center; gap: 8px;
      transition: color .3s;
    }
    .btn-s:hover { color: var(--cream); }
    .arr { display:inline-block; width:20px; height:1px; background:currentColor; position:relative; transition:width .3s; }
    .arr::after { content:''; position:absolute; right:0; top:-3px; width:6px; height:6px; border-right:1px solid currentColor; border-top:1px solid currentColor; transform:rotate(45deg); }
    .btn-s:hover .arr { width:30px; }

    /* Stats */
    .stats {
      position: absolute; right: 80px; top: 50%;
      transform: translateY(-50%);
      z-index: 10; display: flex; flex-direction: column; gap: 40px;
      opacity: 0;
    }
    .stat { text-align: right; padding-left: 20px; border-left: 1px solid var(--gl); }
    .sv { font-family:var(--serif); font-size:42px; font-weight:300; color:var(--gold); line-height:1; margin-bottom:4px; }
    .sl { font-family:var(--sans); font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); }

    /* Elementos de borde */
    .bline { position:absolute; bottom:0; left:0; right:0; height:1px; background:rgba(248,246,241,.07); z-index:10; transform-origin:left; transform:scaleX(0); }
    .snum  { position:absolute; bottom:32px; left:96px; font-family:var(--sans); font-size:10px; letter-spacing:.2em; color:var(--muted); z-index:10; opacity:0; }
    .scrl  { position:absolute; bottom:26px; right:80px; display:flex; align-items:center; gap:10px; font-family:var(--sans); font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); z-index:10; opacity:0; }
    .sbar  { width:32px; height:1px; background:var(--gl); position:relative; overflow:hidden; }
    .sbar::after { content:''; position:absolute; left:-100%; top:0; width:100%; height:100%; background:var(--gold); animation:p 2s ease-in-out 4.5s infinite; }
    @keyframes p { 0%{left:-100%} 50%{left:0} 100%{left:100%} }

    /* Cursor */
    #cur  { position:fixed; width:8px; height:8px; background:var(--gold); border-radius:50%; pointer-events:none; z-index:9999; left:-20px; top:-20px; transform:translate(-50%,-50%); }
    #ring { position:fixed; width:32px; height:32px; border:1px solid rgba(212,175,55,.4); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:width .3s,height .3s,border-color .3s; }
  </style>
</head>
<body>

  <div id="cur"></div>
  <div id="ring"></div>

  <section class="hero">
    <div class="bg" id="bg"></div>
    <div class="grid" id="grid"></div>
    <div class="impact-flash" id="flash"></div>
    <div class="orb" id="orb"></div>
    <div class="vline" id="vl"></div>

    <div class="content">

      <div class="eyebrow" id="ey">
        <div class="eyebrow-in" id="eyin"><span class="dot"></span>Ecosistema de alto rendimiento</div>
      </div>

      <h1 class="headline" id="title">
        Marcas que<br>
        <em>dominan</em> su<br>
        <strong>mercado.</strong>
      </h1>

      <span class="gold-rule" id="rule"></span>

      <div class="sub-wrap">
        <p class="sub" id="sub">
          Construimos ecosistemas de marca que combinan identidad premium,<br>
          estrategia de conversión y experiencias que no se olvidan.
        </p>
      </div>

      <div class="cta-wrap">
        <div class="cta-row" id="cta">
          <a class="btn-p" href="#"><span>Solicitar diagnóstico</span></a>
          <a class="btn-s" href="#"><span class="arr"></span>Ver cómo funciona</a>
        </div>
      </div>

    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="sv">+340%</div><div class="sl">Revenue lift</div></div>
      <div class="stat"><div class="sv">10</div><div class="sl">Unidades conectadas</div></div>
      <div class="stat"><div class="sv">98%</div><div class="sl">Retención</div></div>
    </div>

    <div class="bline" id="bl"></div>
    <div class="snum">01 / 01</div>
    <div class="scrl" id="sc"><span class="sbar"></span>Scroll</div>
  </section>

  <script>
    // Cursor
    const cur = document.getElementById('cur');
    const ring = document.getElementById('ring');
    let mx=innerWidth/2, my=innerHeight/2, rx=mx, ry=my;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; gsap.set(cur,{left:mx,top:my}); });
    (function loop(){ rx+=(mx-rx)*.1; ry+=(my-ry)*.1; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
    document.querySelectorAll('a').forEach(el=>{
      el.addEventListener('mouseenter',()=>{ring.style.width='50px';ring.style.height='50px';ring.style.borderColor='rgba(212,175,55,.7)';});
      el.addEventListener('mouseleave',()=>{ring.style.width='32px';ring.style.height='32px';ring.style.borderColor='rgba(212,175,55,.4)';});
    });

    // ── TIMELINE ─────────────────────────────────────────────
    const tl = gsap.timeline();

    // 1. El título CAE en pantalla negra — rápido y con peso
    tl.to('#title', {
      y: 0, opacity: 1,
      duration: 0.55,
      ease: 'power4.out'
    }, 0.2)

    // 2. Flash de impacto dorado (el mundo "reacciona" al título)
    .to('#flash', { opacity: 1, duration: 0.15, ease: 'power2.out' }, 0.6)
    .to('#flash', { opacity: 0, duration: 0.6, ease: 'power2.in'  }, 0.75)

    // 3. El fondo aparece después del impacto
    .to('#bg',   { opacity: 1, duration: 0.9, ease: 'power2.out' }, 0.65)
    .to('#grid', { opacity: 1, duration: 0.7, ease: 'power2.out' }, 0.8)
    .to('#orb',  { opacity: 1, duration: 1.2, ease: 'power2.out' }, 0.7)

    // 4. Línea dorada bajo el título se dibuja
    .to('#rule', { width: '380px', duration: 0.7, ease: 'power3.inOut' }, 0.85)

    // 5. Línea vertical izq
    .to('#vl', { scaleY: 1, duration: 1.4, ease: 'power2.inOut' }, 0.9)

    // 6. Eyebrow (aparece DESPUÉS que el título ya aterrizó)
    .set('#ey', { opacity: 1 }, 1.1)
    .to('#eyin', { y: '0%', duration: 0.7, ease: 'power3.out' }, 1.1)

    // 7. Subheading
    .to('#sub', { y: '0%', duration: 0.9, ease: 'power3.out' }, 1.35)

    // 8. CTAs
    .to('#cta', { y: '0%', duration: 0.8, ease: 'power3.out' }, 1.6)

    // 9. Stats
    .fromTo('#stats', { x: 40, opacity: 0 }, { x: 0, opacity: 1, duration: 1.0, ease: 'power2.out' }, 1.3)

    // 10. Bottom
    .to('#bl',  { scaleX: 1, duration: 1.5, ease: 'power2.inOut' }, 1.9)
    .to(['.snum','#sc'], { opacity: 1, duration: 0.8, stagger: 0.12 }, 2.1);

    // Parallax
    document.addEventListener('mousemove', e => {
      const cx = e.clientX/innerWidth  - 0.5;
      const cy = e.clientY/innerHeight - 0.5;
      gsap.to('#orb',     { x:cx*70, y:cy*40, duration:2.0, ease:'power1.out' });
      gsap.to('.content', { x:cx*6,  y:cy*4,  duration:2.2, ease:'power1.out' });
    });
  </script>

</body>
</html>
