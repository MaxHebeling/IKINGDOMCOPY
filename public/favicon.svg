<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" fill="#000000"/>
  <!-- i: square dot + stem -->
  <rect x="5" y="5" width="3" height="3" fill="#C9A85C"/>
  <rect x="5" y="11" width="3" height="16" fill="#C9A85C"/>
  <!-- K: vertical bar + two diagonals -->
  <rect x="12" y="5" width="3" height="22" fill="#C9A85C"/>
  <!-- upper arm of K -->
  <polygon points="15,16 27,5 24,5 12,14.5 12,17.5 24,27 27,27" fill="#C9A85C"/>
</svg>
